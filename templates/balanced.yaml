name: balanced
description: Recommended for most development workflows. Auto-approves safe operations, requires confirmation for risky ones.
autoApprove:
  # Read operations
  - Read(**)

  # Git operations (safe)
  - Bash(git status:*)
  - Bash(git diff:*)
  - Bash(git log:*)
  - Bash(git show:*)
  - Bash(git branch:*)
  - Bash(git add:*)
  - Bash(git commit:*)
  - Bash(git checkout:*)
  - Bash(git pull:*)
  - Bash(git push:*)
  - Bash(git merge:*)
  - Bash(git stash:*)
  - Bash(git fetch:*)
  - Bash(git remote:*)

  # GitHub CLI (safe operations)
  - Bash(gh pr create:*)
  - Bash(gh pr list:*)
  - Bash(gh pr view:*)
  - Bash(gh pr checkout:*)
  - Bash(gh pr status:*)
  - Bash(gh issue create:*)
  - Bash(gh issue list:*)
  - Bash(gh issue view:*)
  - Bash(gh repo view:*)
  - Bash(gh api:*)

  # Package management
  - Bash(npm install:*)
  - Bash(npm run dev:*)
  - Bash(npm run build:*)
  - Bash(npm run lint:*)
  - Bash(npm run test:*)
  - Bash(npm list:*)
  - Bash(npm outdated:*)

  # Build and type checking
  - Bash(tsc --noEmit:*)
  - Bash(make:*)

  # File operations
  - Bash(tree:*)
  - Bash(find:*)
  - Bash(grep:*)
  - Bash(ls:*)
  - Bash(cat:*)
  - Bash(head:*)
  - Bash(tail:*)
  - Bash(mkdir:*)
  - Bash(mv:*)
  - Bash(cp:*)

  # Web operations
  - WebSearch
  - WebFetch(domain:docs.*)
  - WebFetch(domain:en.wikipedia.org)
  - WebFetch(domain:github.com)
  - WebFetch(domain:stackoverflow.com)
  - WebFetch(domain:npmjs.com)
